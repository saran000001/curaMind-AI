{% extends 'base.html' %}

{% block content %}
<div class="glass-panel">
    <h2>Create Account</h2>
    <p class="subtitle">Join our HIPAA compliant telehealth platform</p>
    
    <div id="notification" class="notification"></div>
    
    <form id="registerForm">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" class="form-control" required placeholder="John Doe">
        </div>
        <div class="form-group">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" class="form-control" required placeholder="+1 234 567 8900">
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" class="form-control" required placeholder="name@example.com">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-control" required placeholder="Create a strong password">
        </div>
        <button type="submit" class="btn">Register</button>
    </form>
    
    <div class="auth-link">
        Already have an account? <a href="/">Sign In</a>
    </div>
</div>
{% endblock %}
