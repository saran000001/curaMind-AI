{% extends 'base.html' %}

{% block content %}
<div class="glass-panel" style="max-width: 700px;">
    <h2>AI Symptom Checker</h2>
    <p class="subtitle">Describe how you're feeling for a preliminary diagnostic</p>
    
    <div id="userInfo" style="display: none; text-align: center; margin-bottom: 1.5rem; background: rgba(0,0,0,0.2); padding: 0.5rem; border-radius: 8px;">
        Patient: <span id="displayName" style="color: var(--primary); font-weight: bold;"></span> | 
        ID: <span id="displayPatientId" style="color: var(--primary); font-weight: bold;"></span>
    </div>

    <div id="notification" class="notification"></div>
    
    <form id="symptomsForm">
        <div class="form-group">
            <label for="symptomsText">Your Symptoms</label>
            <textarea id="symptomsText" class="form-control" required placeholder="E.g., I have been experiencing a mild headache and fever for the past 2 days..."></textarea>
        </div>
        <button type="submit" class="btn" id="analyzeBtn">Analyze Symptoms</button>
    </form>
</div>
{% endblock %}
